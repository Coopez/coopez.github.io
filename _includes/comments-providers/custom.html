<!-- start custom comments snippet: giscus, themed to follow the site's theme toggle -->
<!-- NOTE: this MUST be a static <script> tag. giscus uses document.currentScript to
     find where to render, which is null for scripts inserted via JS. -->
<script src="https://giscus.app/client.js"
        data-repo="coopez/coopez.github.io"
        data-repo-id="R_kgDOThNEig"
        data-category="Announcements"
        data-category-id="DIC_kwDOThNEis4DB45a"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="light_tritanopia"
        data-lang="en"
        crossorigin="anonymous"
        async>
</script>

<script>
(function () {
  var GISCUS_ORIGIN = "https://giscus.app";

  // Mirror the site's theme: gruvbox_dark for dark, light_tritanopia for light.
  function giscusTheme() {
    var t = localStorage.getItem("theme");
    var dark = (t === "dark") ? true
      : (t === "light") ? false
      : !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    return dark ? "gruvbox_dark" : "light_tritanopia";
  }

  function pushTheme() {
    var frame = document.querySelector("iframe.giscus-frame");
    if (!frame) return;
    frame.contentWindow.postMessage(
      { giscus: { setConfig: { theme: giscusTheme() } } }, GISCUS_ORIGIN);
  }

  // The toggle flips <html data-theme>; mirror it into the giscus iframe.
  new MutationObserver(pushTheme).observe(
    document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

  // Set the correct theme once giscus has loaded (corrects the static default above).
  window.addEventListener("message", function (e) {
    if (e.origin === GISCUS_ORIGIN && e.data && e.data.giscus) pushTheme();
  });
})();
</script>
<!-- end custom comments snippet -->
