{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"></noscript>

<!-- Support for Font Awesome -->
 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="var(--global-bg-color)"/>

<!-- Slimmer footer: trim its internal spacing -->
<style>
  .page__footer { margin-top: 1em; }
  .page__footer footer { margin-top: 0.1em; padding-bottom: 0.1em; }
  .page__footer-follow li { padding-top: 0; padding-bottom: 0; }
  .page__footer-copyright { line-height: 1.3; }
</style>

<!-- Document preview images (paper first page / slides / poster) on detail pages -->
<style>
  .doc-preview { display: block; clear: both; margin: 0.2em auto 1.4em; max-width: 100%;
    border: 1px solid rgba(0,0,0,.15); border-radius: 4px; box-shadow: 0 2px 10px rgba(0,0,0,.12); }
  .doc-preview.slide { width: 560px; }   /* landscape slides / poster */
  a:hover .doc-preview { box-shadow: 0 2px 14px rgba(0,0,0,.22); }
</style>

<!-- Card grid shared by the Talks and Blog list pages -->
<style>
  .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.1em; margin-top: 1.2em; }
  @media (max-width: 620px) { .card-grid { grid-template-columns: 1fr; } }
  .card { display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,.15);
    border-radius: 6px; overflow: hidden; text-decoration: none !important; color: inherit;
    transition: box-shadow .15s ease, transform .15s ease; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.18); transform: translateY(-2px); }
  .card__img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block;
    border-bottom: 1px solid rgba(0,0,0,.12); background: #f2f2f2; }
  .card__body { padding: .6em .85em .9em; background: rgba(0,0,0,.035); flex: 1 1 auto; }
  .card__meta { font-size: .72rem; text-transform: uppercase; letter-spacing: .02em; opacity: .7; margin: 0 0 .4em; }
  .card__title { font-size: .95rem; line-height: 1.25; margin: 0 0 .35em; }
  .card__desc { font-size: .85rem; line-height: 1.4; margin: 0; }
</style>

<!-- Keep the mobile "Contact me" sidebar toggle on one line -->
<style>
  .author__urls-wrapper .btn { white-space: nowrap; }
</style>

<!-- Social preview image (headshot). academicpages emits no og:image/twitter tags
     here (no page header image, no twitter username), so these don't duplicate. -->
<meta property="og:image" content="{{ '/images/og-image.jpg' | absolute_url }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">
<meta property="og:image:alt" content="{{ site.name | default: site.title }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="{{ '/images/og-image.jpg' | absolute_url }}">

<!-- GoatCounter analytics (cookieless; count.js skips localhost, so local preview isn't tracked) -->
<script data-goatcounter="https://niklas.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<!-- end custom head snippets -->
